<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="오리진 게임즈 - 모바일 게임 개발">
  <title>오리진 게임즈</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .container { text-align: center; padding: 40px; }
    h1 { font-size: 2rem; margin-bottom: 10px; color: #ffd700; }
    .subtitle { color: #aaa; margin-bottom: 30px; }
    .game-card {
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 20px;
      margin: 20px auto;
      max-width: 300px;
    }
    .game-card h2 { font-size: 1.2rem; margin-bottom: 10px; }
    .game-card p { font-size: 0.9rem; color: #ccc; margin-bottom: 15px; }
    .game-link {
      display: inline-block;
      background: linear-gradient(135deg, #ffd700, #ffa500);
      color: #1a1a2e;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 0.9rem;
    }
    .footer { margin-top: 40px; color: #666; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>오리진</h1>
    <p class="subtitle">모바일 게임 개발</p>
    <div class="game-card">
      <h2>🏃 그려라 달려라</h2>
      <p>손가락으로 길을 그려 캐릭터를 달리게 하는 3D 로그라이크 러너 게임</p>
      <a href="https://play.google.com/store/apps/details?id=com.drawrun.game" class="game-link">
        Google Play에서 다운로드
      </a>
    </div>
    <div class="game-card">
      <h2>♟️ 체스 키우기</h2>
      <p>체스말을 강화하고 성장시키는 방치형 클리커 게임</p>
      <a href="https://play.google.com/store/apps/details?id=com.chessgrow.game" class="game-link">
        Google Play에서 다운로드
      </a>
    </div>
    <p class="footer">© 2026 오리진. All rights reserved.</p>
  </div>
</body>
</html>
